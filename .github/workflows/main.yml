name: Wails build

on:
  push:
    tags:
      - '*'

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build:
          - name: 'ILMS-linux64'
            platform:  'linux/amd64'
            os: 'ubuntu-latest'
          - name: 'ILMS-win64'
            platform:  'windows/amd64'
            os: 'windows-latest'
          - name: 'ILMS-mac-universal'
            platform:  'darwin/universal'
            os: 'macos-latest'

    runs-on: ${{ matrix.build.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4 
        with:
          submodules: recursive

      - name: Build wails
        uses: dAppServer/wails-build-action@v2.6 
        id: build
        with:
          build-name: ${{ matrix.build.name }}
          build-platform: ${{ matrix.build.platform }}
          package: true
          go-version: '1.26.1'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # This grabs the packaged output from the Wails action
          files: build/bin/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
